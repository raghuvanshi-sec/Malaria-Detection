<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Malaria Detection System{% endblock %}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        // Check for saved theme preference or use system preference
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>

    <!-- Top Navbar - Clinical Header -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fa-solid fa-microscope text-primary me-2"></i> 
                <span>AI Malaria Detection System</span>
            </a>
            <!-- Top Navbar Tabs -->
            <div class="d-none d-md-flex flex-grow-1 px-3 align-items-center justify-content-center">
                <ul class="nav nav-pills" id="navbarTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active fw-bold px-4" id="nav-dashboard-tab" data-bs-toggle="pill" data-bs-target="#tab-dashboard" type="button" role="tab" aria-controls="tab-dashboard" aria-selected="true" style="color: var(--text-main); border-radius: 20px;">
                            <i class="fa-solid fa-chart-pie me-1"></i> Dashboard
                        </button>
                    </li>

                </ul>
            </div>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText">
                <i class="fa-solid fa-bars text-white"></i>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item me-3 d-none d-lg-block">
                        <span class="text-white-50 small" id="liveTimestamp"></span>
                    </li>
                    <li class="nav-item me-3">
                        <button class="btn btn-sm btn-outline-secondary text-white border-0" id="themeToggle" title="Toggle Dark/Light Mode">
                            <i class="fa-solid fa-moon"></i>
                        </button>
                    </li>
                    <li class="nav-item">
                        <span class="nav-link text-light fw-semibold">
                            <i class="fa-solid fa-user-doctor me-2 text-primary"></i>Dr. Priya Sharma
                        </span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar Removed -->

            <main class="col-12 px-md-4 main-content" style="padding-top: 30px;">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Live Timestamp generator
        function updateTime() {
            const now = new Date();
            document.getElementById('liveTimestamp').innerText = now.toLocaleString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Dark mode toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            const icon = themeToggle.querySelector('i');
            if(newTheme === 'dark') {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        });
        
        // Ensure icon matches initial theme
        if (savedTheme === 'dark') {
            document.querySelector('#themeToggle i').classList.replace('fa-moon', 'fa-sun');
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
