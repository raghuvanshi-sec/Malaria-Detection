<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Malaria Detection System{% endblock %}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        // Check for saved theme preference or use system preference
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>

    <!-- Top Navbar - Clinical Header -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fa-solid fa-microscope text-primary me-2"></i> 
                <span>AI Malaria Detection System</span>
                <span class="header-badge d-none d-md-flex" title="Model Version">
                    <i class="fa-solid fa-code-branch"></i> v1.0.3
                </span>
                <span class="header-badge d-none d-md-flex" title="System Status">
                    <span class="status-indicator"></span> Active
                </span>
                <span class="header-badge d-none d-lg-flex" title="GPU Acceleration">
                    <i class="fa-solid fa-microchip text-success"></i> GPU Ready
                </span>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText">
                <i class="fa-solid fa-bars text-white"></i>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item me-3 d-none d-lg-block">
                        <span class="text-white-50 small" id="liveTimestamp"></span>
                    </li>
                    <li class="nav-item me-3">
                        <button class="btn btn-sm btn-outline-secondary text-white border-0" id="themeToggle" title="Toggle Dark/Light Mode">
                            <i class="fa-solid fa-moon"></i>
                        </button>
                    </li>
                    <li class="nav-item">
                        <span class="nav-link text-light fw-semibold">
                            <i class="fa-solid fa-user-doctor me-2 text-primary"></i>Dr. Sarah Jenkins
                        </span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 d-none d-md-block sidebar">
                <a href="/" class="sidebar-link {% block nav_dashboard %}{% endblock %}">
                    <i class="fa-solid fa-chart-pie"></i> Diagnostic Dashboard
                </a>
                <a href="#" class="sidebar-link">
                    <i class="fa-solid fa-file-medical"></i> Patient Records
                </a>
                <a href="#" class="sidebar-link">
                    <i class="fa-solid fa-chart-line"></i> Analytics Model
                </a>
                <a href="#" class="sidebar-link">
                    <i class="fa-solid fa-gear"></i> System Settings
                </a>
                
                <!-- Extra status area in sidebar bottom -->
                <div class="mt-auto position-absolute bottom-0 w-100 p-4 border-top" style="border-color: var(--border-color) !important;">
                    <div class="d-flex align-items-center mb-2">
                        <div class="status-indicator me-2"></div>
                        <span class="small text-muted fw-bold">API STATUS: ONLINE</span>
                    </div>
                    <div class="small text-muted">Latency: ~45ms</div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="col-md-9 col-lg-10 main-content bg-light" style="background-color: var(--bg-color) !important;">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Live Timestamp generator
        function updateTime() {
            const now = new Date();
            document.getElementById('liveTimestamp').innerText = now.toLocaleString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Dark mode toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            const icon = themeToggle.querySelector('i');
            if(newTheme === 'dark') {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        });
        
        // Ensure icon matches initial theme
        if (savedTheme === 'dark') {
            document.querySelector('#themeToggle i').classList.replace('fa-moon', 'fa-sun');
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
