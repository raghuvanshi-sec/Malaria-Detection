<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MalariaScope - Neural Diagnostic Platform</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            background-image: radial-gradient(circle at 50% 30%, rgba(20, 28, 55, 0.8) 0%, #0b0f19 70%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Subtle Stars Layer */
        .stars-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,0.6), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.4), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 300px 300px;
            opacity: 0.15;
        }

        /* Navbar Layout */
        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.4);
        }

        .brand-text-container {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 800;
            color: #818cf8; /* Subtle Indigo */
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-name::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            background: #6366f1;
            border-radius: 4px;
            opacity: 0.8;
        }

        .brand-tagline {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 500;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #e2e8f0;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .status-pill:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981; /* Emerald */
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
        }

        /* Hero Content */
        .hero-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            z-index: 10;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .hero-title .gradient-text {
            background: linear-gradient(135deg, #a78bfa, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 60px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Glassmorphism Cards Container */
        .stats-grid {
            display: flex;
            gap: 24px;
            justify-content: center;
            max-width: 1000px;
            width: 100%;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.4); /* Slate 800 with opacity */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            min-width: 280px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            text-decoration: none;
            color: white;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            border-color: rgba(99, 102, 241, 0.3); /* Subtle indigo border */
        }

        .stat-icon {
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-content {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #93c5fd; /* Light blue text */
        }

        .stat-label {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 500;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }
            .stats-grid {
                flex-direction: column;
                align-items: center;
            }
            .stat-card {
                width: 100%;
                max-width: 350px;
            }
            .top-navbar {
                flex-direction: column;
                gap: 16px;
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>

    <!-- Navigation Bar -->
    <nav class="top-navbar">
        <a href="/dashboard" class="brand-logo">
            <div class="logo-icon">
                <i class="fa-solid fa-plus"></i>
            </div>
            <div class="brand-text-container">
                <div class="brand-name">MalariaScope</div>
                <div class="brand-tagline">Neural Diagnostic Platform</div>
            </div>
        </a>
        
        <div style="display: flex; gap: 16px; align-items: center;">
            <a href="/dashboard" class="status-pill" style="background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.5); color: #93c5fd;">
                <i class="fa-solid fa-chart-line"></i> Dashboard
            </a>
            <a href="/dashboard" class="status-pill">
                <div class="status-dot"></div>
                System Online
            </a>
        </div>
    </nav>

    <!-- Main Hero Content -->
    <main class="hero-section">
        <h1 class="hero-title">
            Revolutionary <span class="gradient-text">AI-Powered</span><br>
            Malaria Detection
        </h1>
        
        <p class="hero-subtitle">
            Clinical-grade accuracy &bull; Real-time analysis &bull; Instant results
        </p>

        <!-- Stats Display -->
        <div class="stats-grid">
            <a href="/dashboard" class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-content">
                    <div class="stat-value">99.2%</div>
                    <div class="stat-label">Accuracy</div>
                </div>
            </a>
            
            <a href="/dashboard" class="stat-card">
                <div class="stat-icon" style="color: #fbbf24;">⚡</div>
                <div class="stat-content">
                    <div class="stat-value">&lt;3s</div>
                    <div class="stat-label">Analysis Time</div>
                </div>
            </a>

            <a href="/dashboard" class="stat-card">
                <div class="stat-icon">🔬</div>
                <div class="stat-content">
                    <div class="stat-value">2,852</div>
                    <div class="stat-label">Scans Today</div>
                </div>
            </a>
        </div>
    </main>
</body>
</html>
